<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="css/Login.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="js/render.js " type="module" charset="utf-8" defer></script>
    <script src="js/Components.js" charset="utf-8" defer></script>
</head>
<body>
    <header></header>
<!-- Fila Maestra -->
    <div class="container-fluid p-0 overflow-hidden" style="height: calc(100vh - 90px);">
        <div class="row g-0 h-100 w-100 m-0">

            <!-- ASIDE: Sin 'h-100' ni 'd-none'. En móvil mide 0px de alto (no estorba), en PC se estira solo a 3 columnas -->
            <div id="aside" class="col-lg-3 p-0"></div>

            <!-- MAIN: Ocupa todo el celular (col-12) y el resto en PC (col-lg-9) -->
            <div id="main" class="col-12 col-lg-9 p-0 h-100"></div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
